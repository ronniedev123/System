<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Weekly Programs</title>
<link rel="stylesheet" href="css/styles.css">
<link rel="stylesheet" href="css/church-theme.css">
<style>
.program-shell {
    display: grid;
    gap: 22px;
}

.manage-form button {
    margin-bottom: 16px;
}
</style>
<link rel="manifest" href="manifest.webmanifest">
<meta name="theme-color" content="#0f6ecf">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Church App">
<link rel="apple-touch-icon" href="assets/icon-192.png"></head>
<body class="church-theme">
<div class="page">
    <div class="page-header">
        <div>
            <span class="page-kicker">Weekly Rhythm</span>
            <h1>Weekly Programs</h1>
            <p class="page-intro">Keep the church program schedule easy to read, update, and revisit.</p>
        </div>
        <div class="header-actions">
            <button id="backBtn" class="btn btn-outline" onclick="window.location.href='dashboard.html'">&larr; Back</button>
            <button id="logoutBtn" class="btn btn-danger">Logout</button>
        </div>
    </div>

    <div class="program-shell">
        <section class="card" id="manageCard" style="display:none;">
            <h2>Manage Weekly Programs</h2>
            <form id="programForm" class="manage-form">
                <select id="day" required>
                    <option value="">Select Day</option>
                    <option>Monday</option>
                    <option>Tuesday</option>
                    <option>Wednesday</option>
                    <option>Thursday</option>
                    <option>Friday</option>
                    <option>Saturday</option>
                    <option>Sunday</option>
                </select>
                <input type="text" id="program" placeholder="Program" required>
                <input type="text" id="time" placeholder="Time" required>
                <input type="text" id="venue" placeholder="Venue" required>
                <button type="submit" id="saveBtn" class="btn btn-primary">Add Program</button>
            </form>
            <p id="manageStatus" class="note"></p>
        </section>

        <section class="card">
            <h3>Ministry of Repentance and Holiness, Umoja Main Altar</h3>
            <p id="roleNote" class="muted"></p>
            <div class="table-wrapper">
                <table>
                    <thead>
                        <tr>
                            <th>Day</th>
                            <th>Program</th>
                            <th>Time</th>
                            <th>Venue</th>
                            <th id="actionsHeader" style="display:none;">Actions</th>
                        </tr>
                    </thead>
                    <tbody id="programsBody"></tbody>
                </table>
            </div>
        </section>
    </div>
</div>

<script>
const token = localStorage.getItem('token');
if (!token) window.location.href = 'index.html';

let role = '';
let canManage = false;
let editingId = null;

try {
    const payload = JSON.parse(atob(token.split('.')[1]));
    role = payload.role;
    if (!['admin', 'user', 'normaluser'].includes(role)) {
        localStorage.removeItem('token');
        window.location.href = 'index.html';
    }
    canManage = role === 'admin' || role === 'user';
} catch (e) {
    localStorage.removeItem('token');
    window.location.href = 'index.html';
}

if (canManage) {
    document.getElementById('manageCard').style.display = 'block';
    document.getElementById('actionsHeader').style.display = '';
    document.getElementById('roleNote').textContent = 'You can add, edit, and delete weekly programs.';
} else {
    document.getElementById('roleNote').textContent = 'View-only mode: normal users can only view weekly programs.';
}

document.getElementById('logoutBtn').addEventListener('click', () => {
    localStorage.removeItem('token');
    window.location.href = 'index.html';
});

async function loadPrograms() {
    try {
        const res = await fetch('/api/weekly-programs', {
            headers: { Authorization: `Bearer ${token}` }
        });
        const data = await res.json();
        if (!res.ok) throw new Error(data.error || 'Failed to load programs');

        const body = document.getElementById('programsBody');
        body.innerHTML = '';
        data.forEach(p => {
            const tr = document.createElement('tr');
            const actions = canManage
                ? `<td>
                    <div class="btn-row">
                        <button class="small-btn btn-primary" onclick='startEdit(${p.id}, ${JSON.stringify(p.day_of_week)}, ${JSON.stringify(p.program_name)}, ${JSON.stringify(p.time_slot)}, ${JSON.stringify(p.venue)})'>Edit</button>
                        <button class="small-btn btn-danger" onclick='deleteProgram(${p.id})'>Delete</button>
                    </div>
                   </td>`
                : '';
            tr.innerHTML = `
                <td>${p.day_of_week}</td>
                <td>${p.program_name}</td>
                <td>${p.time_slot}</td>
                <td>${p.venue}</td>
                ${actions}
            `;
            body.appendChild(tr);
        });
    } catch (err) {
        console.error(err);
        alert('Failed to load weekly programs');
    }
}

function startEdit(id, day, program, time, venue) {
    editingId = id;
    document.getElementById('day').value = day;
    document.getElementById('program').value = program;
    document.getElementById('time').value = time;
    document.getElementById('venue').value = venue;
    document.getElementById('saveBtn').textContent = 'Update Program';
    document.getElementById('manageStatus').textContent = 'Editing selected program...';
}

async function deleteProgram(id) {
    if (!canManage) return;
    if (!confirm('Delete this weekly program?')) return;
    try {
        const res = await fetch(`/api/weekly-programs/${id}`, {
            method: 'DELETE',
            headers: { Authorization: `Bearer ${token}` }
        });
        const data = await res.json();
        if (!res.ok) return alert(data.error || 'Failed to delete program');
        loadPrograms();
    } catch (err) {
        console.error(err);
        alert('Server error');
    }
}

document.getElementById('programForm')?.addEventListener('submit', async (e) => {
    e.preventDefault();
    if (!canManage) return;

    const payload = {
        day: document.getElementById('day').value,
        program: document.getElementById('program').value.trim(),
        time: document.getElementById('time').value.trim(),
        venue: document.getElementById('venue').value.trim()
    };

    try {
        const url = editingId ? `/api/weekly-programs/${editingId}` : '/api/weekly-programs';
        const method = editingId ? 'PUT' : 'POST';
        const res = await fetch(url, {
            method,
            headers: {
                'Content-Type': 'application/json',
                Authorization: `Bearer ${token}`
            },
            body: JSON.stringify(payload)
        });
        const data = await res.json();
        if (!res.ok) return alert(data.error || 'Failed to save program');

        editingId = null;
        document.getElementById('programForm').reset();
        document.getElementById('saveBtn').textContent = 'Add Program';
        document.getElementById('manageStatus').textContent = method === 'POST' ? 'Program added.' : 'Program updated.';
        loadPrograms();
    } catch (err) {
        console.error(err);
        alert('Server error');
    }
});

loadPrograms();
</script>
<script src="js/pwa.js"></script>
</body>
</html>
