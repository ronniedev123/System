<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Events</title>
<link rel="stylesheet" href="css/styles.css">
<link rel="stylesheet" href="css/church-theme.css">
<style>
.events-stack {
    display: grid;
    gap: 22px;
}

.events-form {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
    gap: 14px;
    align-items: end;
}

.events-form button {
    margin-bottom: 16px;
}
</style>
<link rel="manifest" href="manifest.webmanifest">
<meta name="theme-color" content="#0f6ecf">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Church App">
<link rel="apple-touch-icon" href="assets/icon-192.png"></head>
<body class="church-theme">
<div class="page">
    <div class="page-header">
        <div>
            <span class="page-kicker">Events</span>
            <h1>Church Events</h1>
            <p class="page-intro">Track upcoming gatherings and keep important ministry dates visible for the team.</p>
        </div>
        <div class="header-actions">
            <button id="backBtn" class="btn btn-outline" onclick="window.location.href='dashboard.html'">&larr; Back</button>
            <button id="logoutBtn" class="btn btn-danger">Logout</button>
        </div>
    </div>

    <div class="events-stack">
        <section id="adminActions" class="card" style="display:none;">
            <h3>Add Event</h3>
            <form id="addEventForm" class="events-form">
                <input type="text" id="title" placeholder="Event Title" required>
                <input type="date" id="date" required>
                <button type="submit" class="btn btn-primary">Add Event</button>
            </form>
        </section>

        <section class="card">
            <h3>Events List</h3>
            <div class="table-wrapper">
                <table>
                    <thead><tr><th>ID</th><th>Title</th><th>Date</th><th>Actions</th></tr></thead>
                    <tbody id="eventsTable"></tbody>
                </table>
            </div>
        </section>
    </div>

<script>
const token = localStorage.getItem('token');
if(!token) window.location.href="index.html";

const payload = JSON.parse(atob(token.split('.')[1]));
const role = payload.role;
if(role === 'normaluser') window.location.href = "dashboard.html";
if(role==='admin') document.getElementById('adminActions').style.display='block';

document.getElementById('logoutBtn').addEventListener('click',()=>{ localStorage.removeItem('token'); window.location.href="index.html"; });

async function loadEvents(){
    try{
        const res = await fetch("/api/events",{ headers:{ Authorization:`Bearer ${token}` }});
        const events = await res.json();
        const tbody=document.getElementById('eventsTable');
        tbody.innerHTML="";
        events.forEach(e=>{
            const tr=document.createElement('tr');
            tr.innerHTML=`<td>${e.id}</td><td>${e.title}</td><td>${e.date}</td>
            <td>${role==='admin'? `<button class="small-btn btn-danger" onclick="deleteEvent(${e.id})">Delete</button>` : ''}</td>`;
            tbody.appendChild(tr);
        });
    }catch(err){ console.error(err); alert("Error fetching events"); }
}

document.getElementById('addEventForm')?.addEventListener('submit',async e=>{
    e.preventDefault();
    const title=document.getElementById('title').value;
    const date=document.getElementById('date').value;
    try{
        const res = await fetch("/api/events",{
            method:"POST", headers:{"Content-Type":"application/json", Authorization:`Bearer ${token}`}, body:JSON.stringify({title,date})
        });
        if(res.ok){ alert("Event added"); loadEvents(); }
        else{ const data = await res.json(); alert(data.error || "Error adding event"); }
    }catch(err){ console.error(err); alert("Server error"); }
});

async function deleteEvent(id){
    if(!confirm("Delete this event?")) return;
    try{
        const res = await fetch(`/api/events/${id}`,{ method:"DELETE", headers:{ Authorization:`Bearer ${token}` }});
        if(res.ok) loadEvents();
        else alert("Error deleting event");
    }catch(err){ console.error(err); alert("Server error"); }
}

loadEvents();
</script>
<script src="js/pwa.js"></script>
</body>
</html>
