<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Ministry of Repentance and Holiness</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;700&family=Source+Sans+3:wght@400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --gold: #d4a017;
            --deep-blue: #0f1f3d;
            --deep-blue-2: #172b57;
            --paper: #fbf8ef;
            --ink: #1d2430;
            --danger: #d93b3b;
        }

        * { box-sizing: border-box; }

        body {
            margin: 0;
            min-height: 100vh;
            font-family: "Source Sans 3", sans-serif;
            background:
                radial-gradient(circle at 14% 20%, rgba(212,160,23,0.23), transparent 35%),
                radial-gradient(circle at 80% 84%, rgba(212,160,23,0.15), transparent 35%),
                linear-gradient(145deg, var(--deep-blue), var(--deep-blue-2));
            color: var(--paper);
            display: grid;
            place-items: center;
            padding: 24px;
        }

        .panel {
            width: min(460px, 100%);
            background: rgba(6, 17, 38, 0.75);
            border: 1px solid rgba(212,160,23,0.45);
            border-radius: 16px;
            padding: 30px 24px;
            box-shadow: 0 18px 40px rgba(0,0,0,0.32);
        }

        .top {
            text-align: center;
            margin-bottom: 14px;
        }

        .top h1 {
            margin: 0;
            font-family: "Cinzel", serif;
            font-size: 1.35rem;
            line-height: 1.35;
        }

        .cross {
            color: var(--gold);
            font-size: 34px;
            margin-bottom: 6px;
        }

        form { display: grid; gap: 12px; }

        input {
            width: 100%;
            border: 1px solid rgba(251,248,239,0.42);
            border-radius: 9px;
            padding: 11px;
            background: rgba(251,248,239,0.97);
            color: var(--ink);
            font-size: 1rem;
        }

        button {
            border: none;
            border-radius: 10px;
            padding: 12px;
            cursor: pointer;
            font-weight: 700;
            font-size: 1rem;
            background: var(--gold);
            color: #1f1d15;
        }

        #error {
            min-height: 20px;
            margin: 0;
            color: #ffb7b7;
            font-weight: 600;
            text-align: center;
        }

        .links {
            margin-top: 12px;
            display: flex;
            justify-content: space-between;
            gap: 10px;
            flex-wrap: wrap;
        }

        .links a {
            color: var(--paper);
            text-decoration: none;
            border-bottom: 1px dashed rgba(251,248,239,0.6);
        }
    </style>
</head>
<body>
    <section class="panel">
        <div class="top">
            <div class="cross">✝</div>
            <h1>Ministry of Repentance and Holiness<br>Umoja Main Altar</h1>
        </div>

        <form id="loginForm">
            <input type="email" id="email" placeholder="Email" required>
            <input type="password" id="password" placeholder="Password" required>
            <button type="submit">Login</button>
            <p id="error"></p>
        </form>

        <div class="links">
            <a href="index.html">Back to Welcome</a>
            <a href="register.html">Create Account</a>
        </div>
    </section>

    <script src="js/main.js"></script>
</body>
</html>
