<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Manage Users</title>
<link rel="stylesheet" href="css/styles.css">
<link rel="stylesheet" href="css/church-theme.css">
<style>
.utility-grid {
    display: grid;
    gap: 22px;
}

.users-form {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
    gap: 14px;
    align-items: end;
}

.users-form button {
    margin-bottom: 16px;
}
</style>
<link rel="manifest" href="manifest.webmanifest">
<meta name="theme-color" content="#0f6ecf">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Church App">
<link rel="apple-touch-icon" href="assets/icon-192.png"></head>
<body class="church-theme">
<div class="page">
    <div class="page-header">
        <div>
            <span class="page-kicker">Administration</span>
            <h1>Manage Users</h1>
            <p class="page-intro">Create, approve, edit, block, and remove system accounts from one lighter admin page.</p>
        </div>
        <div class="header-actions">
            <button id="backBtn" class="btn btn-outline" onclick="window.location.href='dashboard.html'">&larr; Back</button>
            <button id="logoutBtn" class="btn btn-danger">Logout</button>
        </div>
    </div>

    <div class="utility-grid">
        <section class="card">
            <h3>Add User</h3>
            <p class="muted">New team members can be added here and assigned the right role immediately.</p>
            <form id="addUserForm" class="users-form">
                <input type="text" id="name" placeholder="Name" required>
                <input type="tel" id="phone" placeholder="Phone Number" required>
                <input type="password" id="password" placeholder="Password" required>
                <select id="role">
                    <option value="user">User</option>
                    <option value="admin">Admin</option>
                </select>
                <button type="submit" class="btn btn-primary">Add User</button>
            </form>
        </section>

        <section class="card">
            <h3>Accounts</h3>
            <div class="table-wrapper">
                <table>
                    <thead>
                        <tr><th>ID</th><th>Name</th><th>Phone</th><th>Role</th><th>Status</th><th>Actions</th></tr>
                    </thead>
                    <tbody id="usersTable"></tbody>
                </table>
            </div>
        </section>
    </div>

<script>
document.getElementById('logoutBtn').addEventListener('click',()=>{ localStorage.removeItem('token'); window.location.href="index.html"; });

try {
    const token = localStorage.getItem('token');
    if (!token) window.location.href = 'index.html';
    const payload = JSON.parse(atob(token.split('.')[1]));
    if (payload.role !== 'admin') {
        window.location.href = 'dashboard.html';
    }
} catch (e) {
    localStorage.removeItem('token');
    window.location.href = 'index.html';
}

function getCurrentUserId(){
    try{
        const token = localStorage.getItem('token');
        if(!token) return null;
        const payload = JSON.parse(atob(token.split('.')[1]));
        return Number(payload.id);
    } catch {
        return null;
    }
}

document.getElementById('addUserForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    const token = localStorage.getItem('token');
    if(!token) return window.location.href = 'index.html';
    const name = document.getElementById('name').value;
    const phone = document.getElementById('phone').value;
    const password = document.getElementById('password').value;
    const role = document.getElementById('role').value;
    try{
        const endpoint = '/api/auth/admin/create-user';
        const res = await fetch(endpoint, {
            method: 'POST',
            headers: {'Content-Type':'application/json','Authorization':`Bearer ${token}`},
            body: JSON.stringify({name,phone,password,role})
        });
        const data = await res.json();
        if(res.ok){
            alert('User added');
            document.getElementById('addUserForm').reset();
            loadUsers();
        }
        else alert(data.error || data.message || 'Error');
    } catch(err){ console.error(err); alert('Server error'); }
});

async function loadUsers(){
    const token = localStorage.getItem('token');
    if(!token) return window.location.href='index.html';
    try{
        const res = await fetch('/api/auth/users', {
            cache: 'no-store',
            headers: { Authorization: `Bearer ${token}` }
        });
        if(!res.ok){ const d = await res.json(); return alert(d.error || d.message || 'Failed to fetch users'); }
        const users = await res.json();
        const tbody = document.getElementById('usersTable');
        tbody.innerHTML = '';
        users.forEach(u => {
            const tr = document.createElement('tr');
            const isApproved = Number(u.is_approved) === 1;
            const isBlocked = Number(u.is_blocked) === 1;
            const status = isBlocked ? 'Blocked' : (isApproved ? 'Approved' : 'Pending Approval');
            const canApprove = !isApproved && u.role === 'user';
            const isSelf = Number(u.id) === getCurrentUserId();
            const approveBtn = canApprove
                ? `<button class="small-btn btn-secondary" onclick="approveUser(${u.id})">Approve</button>`
                : '';
            const blockBtn = isSelf
                ? ''
                : `<button class="small-btn btn-warning" onclick="toggleBlockUser(${u.id}, ${isBlocked ? 'false' : 'true'})">${isBlocked ? 'Unblock' : 'Block'}</button>`;
            const editBtn = `<button class="small-btn btn-primary" onclick="editUser(${u.id}, '${String(u.name).replace(/'/g, "\\'")}', '${String(u.phone || '').replace(/'/g, "\\'")}', '${u.role}')">Edit</button>`;
            const deleteBtn = isSelf
                ? ''
                : `<button class="small-btn btn-danger" onclick="deleteUser(${u.id})">Delete</button>`;
            tr.innerHTML = `<td>${u.id}</td><td>${u.name}</td><td>${u.phone || ''}</td><td>${u.role}</td><td>${status}</td><td>${approveBtn} ${blockBtn} ${editBtn} ${deleteBtn}</td>`;
            tbody.appendChild(tr);
        });
    }catch(err){ console.error(err); alert('Error loading users'); }
}

async function approveUser(userId){
    const token = localStorage.getItem('token');
    if(!token) return window.location.href='index.html';
    try{
        const res = await fetch(`/api/auth/admin/users/${userId}/approve`, {
            method: 'PATCH',
            headers: { Authorization: `Bearer ${token}` }
        });
        const data = await res.json();
        if(!res.ok){ return alert(data.error || data.message || 'Failed to approve user'); }
        alert('User approved');
        loadUsers();
    } catch (err) {
        console.error(err);
        alert('Server error');
    }
}

async function toggleBlockUser(userId, blocked){
    const token = localStorage.getItem('token');
    if(!token) return window.location.href='index.html';
    const action = blocked ? 'block' : 'unblock';
    if(!confirm(`Are you sure you want to ${action} this user?`)) return;
    try{
        const res = await fetch(`/api/auth/admin/users/${userId}/block`, {
            method: 'PATCH',
            headers: {
                'Content-Type': 'application/json',
                Authorization: `Bearer ${token}`
            },
            body: JSON.stringify({ blocked })
        });
        const data = await res.json();
        if(!res.ok){ return alert(data.error || data.message || `Failed to ${action} user`); }
        alert(data.message || `User ${action}ed`);
        loadUsers();
    } catch (err) {
        console.error(err);
        alert('Server error');
    }
}

async function editUser(userId, currentName, currentPhone, currentRole){
    const token = localStorage.getItem('token');
    if(!token) return window.location.href='index.html';

    const name = prompt('Edit name:', currentName);
    if (name === null) return;
    const phone = prompt('Edit phone:', currentPhone);
    if (phone === null) return;
    const role = prompt('Edit role (admin, user, normaluser):', currentRole);
    if (role === null) return;
    const password = prompt('New password (leave blank to keep current):', '');

    try{
        const res = await fetch(`/api/auth/admin/users/${userId}`, {
            method: 'PUT',
            headers: {
                'Content-Type': 'application/json',
                Authorization: `Bearer ${token}`
            },
            body: JSON.stringify({
                name: String(name).trim(),
                phone: String(phone).trim(),
                role: String(role).trim(),
                password: password === null ? '' : String(password)
            })
        });
        const data = await res.json();
        if(!res.ok){ return alert(data.error || data.message || 'Failed to update user'); }
        alert(data.message || 'User updated');
        loadUsers();
    } catch (err) {
        console.error(err);
        alert('Server error');
    }
}

async function deleteUser(userId){
    const token = localStorage.getItem('token');
    if(!token) return window.location.href='index.html';
    if(!confirm('Delete this user account permanently?')) return;

    try{
        const res = await fetch(`/api/auth/admin/users/${userId}`, {
            method: 'DELETE',
            headers: { Authorization: `Bearer ${token}` }
        });
        const data = await res.json();
        if(!res.ok){ return alert(data.error || data.message || 'Failed to delete user'); }
        alert(data.message || 'User deleted');
        loadUsers();
    } catch (err) {
        console.error(err);
        alert('Server error');
    }
}

loadUsers();
</script>
<script src="js/pwa.js"></script>
</body>
</html>
