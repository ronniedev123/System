<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Departments</title>
<link rel="stylesheet" href="css/styles.css">
<link rel="stylesheet" href="css/church-theme.css">
<style>
.page {
    max-width: 1200px;
    margin: 30px auto;
    padding: 20px;
}

.page-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 25px;
    gap: 16px;
}

.page-header h1 {
    font-size: 26px;
    font-weight: 700;
    margin: 0;
}

.page-header .btn {
    min-width: 140px;
}

.card {
    background: var(--card);
    border-radius: 16px;
    padding: 24px;
    box-shadow: 0 10px 25px rgba(0,0,0,0.05);
    margin-bottom: 30px;
}

.card h3 {
    margin-top: 0;
}

.muted {
    color: var(--muted);
    font-size: 0.95rem;
}

.department-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
    gap: 18px;
    margin-top: 18px;
}

.department-card {
    display: block;
    text-decoration: none;
    color: inherit;
    padding: 20px;
    border-radius: 18px;
    border: 1px solid var(--border);
    background: linear-gradient(135deg, rgba(33, 150, 243, 0.08), rgba(255, 255, 255, 0.96));
    transition: transform 0.18s ease, box-shadow 0.18s ease, border-color 0.18s ease;
}

.department-card:hover {
    transform: translateY(-4px);
    box-shadow: 0 12px 28px rgba(0,0,0,0.08);
    border-color: var(--primary);
}

.department-card h4 {
    margin: 0 0 10px;
    font-size: 1.05rem;
}

.department-card p {
    margin: 0;
}

.department-count {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    min-width: 42px;
    height: 42px;
    border-radius: 999px;
    background: var(--primary);
    color: white;
    font-weight: 700;
    margin-bottom: 14px;
}

.loading {
    padding: 16px;
    border-radius: 12px;
    background: var(--bg);
}
</style>
<link rel="manifest" href="manifest.webmanifest">
<meta name="theme-color" content="#17376f">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Church App">
<link rel="apple-touch-icon" href="assets/icon-192.png"></head>
<body class="church-theme">
<div class="page">
    <div class="page-header">
        <button class="btn btn-primary" onclick="location.href='dashboard.html'">&larr; Back</button>
        <h1>Departments</h1>
        <button id="logoutBtn" class="btn btn-danger">Logout</button>
    </div>

    <div class="card">
        <h3>Choose A Department</h3>
        <p class="muted">Each department now opens on its own members page. Select one below to manage or view only that group.</p>
        <div id="departmentGrid" class="department-grid">
            <div class="loading">Loading departments...</div>
        </div>
    </div>
</div>
<script src="js/departments.js"></script>
<script src="js/pwa.js"></script>
</body>
</html>
