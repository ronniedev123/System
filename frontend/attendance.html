<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Attendance</title>
<link rel="stylesheet" href="css/styles.css">

<style>
body { font-family: Arial, sans-serif; max-width: 900px; margin: 40px auto; padding: 20px; }
table { width: 100%; border-collapse: collapse; margin-top: 20px; }
th, td { border: 1px solid #ccc; padding: 10px; text-align: left; }
th { background: #f2f2f2; }
button { padding: 5px 10px; cursor: pointer; }
#logoutBtn { float: right; background-color: #f44336; color: white; border: none; border-radius: 5px; }

.suggestion-item {
    padding: 10px;
    cursor: pointer;
    border-bottom: 1px solid #eee;
}
.suggestion-item:hover {
    background-color: #f0f0f0;
}

.clickable-cell { cursor: pointer; user-select: none; }
.clickable-cell:hover { opacity: 0.8; }
.clickable-cell.pending-cell { cursor: progress; }

th { background-color: #2196F3; color: white; font-weight: bold; }
tr:nth-child(even) { background-color: #f9f9f9; }
</style>
</head>
<body>

<button onclick="window.location.href='dashboard.html'" 
style="float:left; background-color:#2196f3; color:white; border:none; padding:10px 20px; border-radius:5px; cursor:pointer; margin-right:10px;">
← Back
</button>

<button id="logoutBtn">Logout</button>

<h1>Track Attendance & Reports</h1>

<div style="display:grid; grid-template-columns:1fr 1fr; gap:30px;">
<div style="border:1px solid #ddd; padding:20px; border-radius:8px; background:#f9f9f9;">
<h3>Mark Member Attendance</h3>
<form id="attendanceForm">

<label>Department:</label>
<select id="departmentSelect" 
style="width:100%; padding:10px; margin-bottom:15px; border:1px solid #ccc; border-radius:4px;">
<option value="All Members">All Members (Master List)</option>
</select>

<label>Member Name:</label>
<select id="member_id" required 
style="width:100%; padding:10px; margin-bottom:15px; border:1px solid #ccc; border-radius:4px;">
<option value="">-- Select Member --</option>
</select>

<label>Date & Time (optional):</label>
<input type="datetime-local" id="date"
style="width:100%; padding:10px; margin-bottom:15px; border:1px solid #ccc; border-radius:4px;">

<button type="submit" style="background:#4CAF50; color:white; border:none; padding:10px; width:100%; border-radius:4px;">Mark Attendance</button>
<button type="button" id="createMemberBtn" style="background:#2196F3; color:white; border:none; padding:10px; width:100%; border-radius:4px; margin-top:10px;">Create New Member</button>

</form>
</div>

<div style="border:1px solid #ddd; padding:20px; border-radius:8px; background:#f9f9f9;">
<h3>Attendance Reports</h3>

<label>Select Month:</label>
<select id="monthSelect" style="width:100%; padding:10px;"></select>

<label>Select Year:</label>
<select id="yearSelect" style="width:100%; padding:10px;"></select>

</div>
</div>

<div style="margin-top:30px; border:1px solid #ddd; padding:20px; border-radius:8px;">
<h3 id="reportTitle">Attendance Summary</h3>
<p id="adminHint" style="display:none; color:#2196F3; font-weight:bold;">
Admins: Click any cell to edit attendance
</p>

<div style="overflow-x:auto;">
<table>
<thead id="attendanceHead"></thead>
<tbody id="attendanceTable"></tbody>
</table>
</div>
</div>

<!-- Create Member Modal -->
<div id="memberModal" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.5); z-index:1000; padding:20px;">
<div style="background:white; margin:50px auto; padding:30px; border-radius:8px; max-width:400px;">
<h2>Create New Member</h2>
<form id="createMemberForm">
<label>Name:</label>
<input type="text" id="newMemberName" required style="width:100%; padding:10px; margin-bottom:15px; border:1px solid #ccc; border-radius:4px;">

<label>Email:</label>
<input type="email" id="newMemberEmail" style="width:100%; padding:10px; margin-bottom:15px; border:1px solid #ccc; border-radius:4px;">

<label>Gender:</label>
<select id="newMemberGender" style="width:100%; padding:10px; margin-bottom:15px; border:1px solid #ccc; border-radius:4px;">
<option value="">-- Select Gender --</option>
<option value="Male">Male</option>
<option value="Female">Female</option>
<option value="Other">Other</option>
</select>

<label>Department:</label>
<input type="text" id="newMemberDepartment" list="departmentList" style="width:100%; padding:10px; margin-bottom:15px; border:1px solid #ccc; border-radius:4px;">

<label>Phone:</label>
<input type="tel" id="newMemberPhone" style="width:100%; padding:10px; margin-bottom:15px; border:1px solid #ccc; border-radius:4px;">

<label>Address:</label>
<input type="text" id="newMemberAddress" style="width:100%; padding:10px; margin-bottom:15px; border:1px solid #ccc; border-radius:4px;">

<div style="display:flex; gap:10px;">
<button type="submit" style="flex:1; background:#4CAF50; color:white; border:none; padding:10px; border-radius:4px; cursor:pointer;">
Create Member
</button>
<button type="button" id="closeModalBtn" style="flex:1; background:#999; color:white; border:none; padding:10px; border-radius:4px; cursor:pointer;">
Cancel
</button>
</div>
</form>
</div>
</div>

<datalist id="departmentList"></datalist>

<script>

const token = localStorage.getItem('token');
const storedRole = String(localStorage.getItem('role') || '').trim().toLowerCase();
if (!token) window.location.href = "index.html";

let role = '';
try {
    const payload = JSON.parse(atob(token.split('.')[1]));
    role = String(payload.role || storedRole).trim().toLowerCase();
} catch (e) {
    localStorage.removeItem('token');
    window.location.href = "index.html";
}

if (!role && storedRole) {
    role = storedRole;
}

let allMembers = [];
let activeDepartment = "All Members";
const MASTER_LABEL = "All Members";
const UNASSIGNED_LABEL = "Unassigned";
const DEFAULT_DEPARTMENTS = [
    "Priesthood",
    "Ushers",
    "Translators",
    "Technical Team",
    "Worshippers",
    "Security",
    "Decorators",
    "Kitchen",
    "Sunday School Teachers",
];

document.getElementById('logoutBtn').addEventListener('click',()=>{
    localStorage.removeItem('token');
    window.location.href="index.html";
});

function getAttendanceCellContent(isPresent, isPending = false) {
    if (isPending) {
        return '<span style="color:#ff9800;font-weight:bold;">…</span>';
    }

    return isPresent
        ? '<span style="color:green;font-weight:bold;">✓</span>'
        : '<span style="color:red;">✗</span>';
}

function paintAttendanceCell(cell, isPresent, isPending = false) {
    if (!cell) return;

    cell.dataset.present = isPresent ? 'true' : 'false';
    cell.dataset.pending = isPending ? 'true' : 'false';
    cell.innerHTML = getAttendanceCellContent(isPresent, isPending);
    cell.title = isPending ? 'Updating attendance...' : 'Click to toggle attendance';
    cell.style.pointerEvents = isPending ? 'none' : '';
    cell.style.opacity = isPending ? '0.6' : '';
    cell.classList.toggle('pending-cell', isPending);
}

function isAdmin() {
    return role === 'admin';
}

function normalizeDepartment(value){
    const trimmed = String(value || '').trim();
    if (!trimmed) return UNASSIGNED_LABEL;
    return trimmed.toLowerCase() === 'worship' ? 'Worshippers' : trimmed;
}

function buildDepartmentList(){
    const seen = new Set();
    const ordered = [MASTER_LABEL];

    const addDept = (dept) => {
        const label = String(dept || '').trim();
        if (!label || label === MASTER_LABEL || label === UNASSIGNED_LABEL) return;
        if (!seen.has(label)) {
            seen.add(label);
            ordered.push(label);
        }
    };

    DEFAULT_DEPARTMENTS.forEach(addDept);

    let hasUnassigned = false;
    allMembers.forEach((m) => {
        const dept = normalizeDepartment(m.department);
        if (dept === UNASSIGNED_LABEL) {
            hasUnassigned = true;
        } else {
            addDept(dept);
        }
    });

    if (hasUnassigned) {
        ordered.push(UNASSIGNED_LABEL);
    }

    return ordered;
}

function updateDepartmentSelect(){
    const select = document.getElementById('departmentSelect');
    if (!select) return;
    const departments = buildDepartmentList();
    if (!departments.includes(activeDepartment)) {
        activeDepartment = MASTER_LABEL;
    }
    select.innerHTML = '';
    departments.forEach((dept) => {
        const opt = document.createElement('option');
        opt.value = dept;
        opt.textContent = dept === MASTER_LABEL ? 'All Members (Master List)' : dept;
        if (dept === activeDepartment) opt.selected = true;
        select.appendChild(opt);
    });

    const datalist = document.getElementById('departmentList');
    if (datalist) {
        datalist.innerHTML = departments
            .filter((d) => d !== MASTER_LABEL && d !== UNASSIGNED_LABEL)
            .map((d) => `<option value="${d}"></option>`)
            .join('');
    }
}

function getFilteredMembers(){
    if (activeDepartment === MASTER_LABEL) return allMembers;
    return allMembers.filter((m) => normalizeDepartment(m.department) === activeDepartment);
}

// Fetch members and refresh department list
async function refreshMembers(){
    try {
        const res = await fetch('/api/members', {
            headers: { "Authorization": `Bearer ${token}` }
        });
        if(res.status === 401){
            alert('Session expired. Please log in again.');
            localStorage.removeItem('token');
            window.location.href='index.html';
            return;
        }
        const members = await res.json();
        allMembers = Array.isArray(members) ? members : [];
        updateDepartmentSelect();
        populateMemberDropdown();
    } catch(e) { 
        console.error('Error loading members:', e); 
        alert('Unable to load members. See console for details.');
    }
}

// Populate member dropdown (filtered by department)
function populateMemberDropdown(){
    const members = getFilteredMembers();
    const sel = document.getElementById('member_id');
    if (!sel) return;
    sel.innerHTML = '<option value="">-- Select Member --</option>';
    if(members.length === 0){
        const opt = document.createElement('option');
        opt.value = '';
        opt.textContent = 'No members available';
        opt.disabled = true;
        sel.appendChild(opt);
        sel.disabled = true;
    } else {
        members.forEach(m => {
            const opt = document.createElement('option');
            opt.value = m.id;
            const deptLabel = normalizeDepartment(m.department);
            opt.textContent = deptLabel === UNASSIGNED_LABEL ? m.name : `${m.name} (${deptLabel})`;
            sel.appendChild(opt);
        });
        sel.disabled = false;
    }
}

// Mark attendance form handler
const attendanceForm = document.getElementById('attendanceForm');
if (attendanceForm) {
    attendanceForm.addEventListener('submit', async (e) => {
        e.preventDefault();
        const memberId = document.getElementById('member_id').value;
        let date = document.getElementById('date').value || null;
        
        if (!memberId) {
            alert('Please select a member');
            return;
        }
        
        const payload = { memberId: parseInt(memberId), date };
        console.log('Submitting attendance payload:', payload);
        
        try {
            const res = await fetch('/api/attendance', {
                method: 'POST',
                headers: { 
                    "Content-Type": "application/json", 
                    "Authorization": `Bearer ${token}` 
                },
                body: JSON.stringify(payload)
            });
            const text = await res.text();
            let json;
            try { json = JSON.parse(text); } catch(e){ json = { message: text }; }
            console.log('Attendance response', res.status, json);
            
            if (res.ok) {
                alert('Attendance marked successfully');
                attendanceForm.reset();
                loadAttendance(); // Reload the summary table
            } else if (res.status === 401) {
                alert('Session expired. Please login again.');
                localStorage.removeItem('token');
                window.location.href = 'index.html';
            } else {
                alert(json.error || json.message || 'Error marking attendance');
            }
        } catch(err) {
            console.error('Error submitting attendance:', err);
            alert('Error marking attendance. See console for details.');
        }
    });
}

function populateMonthYear(){
    const monthSel = document.getElementById('monthSelect');
    const yearSel = document.getElementById('yearSelect');
    const now = new Date();

    for(let m=0;m<12;m++){
        const opt=document.createElement('option');
        opt.value=m;
        opt.text=new Date(0,m).toLocaleString('default',{month:'long'});
        if(m===now.getMonth()) opt.selected=true;
        monthSel.appendChild(opt);
    }

    for(let y=now.getFullYear()-2;y<=now.getFullYear()+1;y++){
        const opt=document.createElement('option');
        opt.value=y;
        opt.text=y;
        if(y===now.getFullYear()) opt.selected=true;
        yearSel.appendChild(opt);
    }
}

async function loadAttendance(){
    try {
        const month = parseInt(document.getElementById('monthSelect').value);
        const year = parseInt(document.getElementById('yearSelect').value);
        
        const monthName = new Date(0, month).toLocaleString('default', {month:'long'});
        const deptLabel = activeDepartment === MASTER_LABEL ? 'All Members (Master List)' : activeDepartment;
        document.getElementById('reportTitle').textContent = `Attendance Summary - ${monthName} ${year} (${deptLabel})`;
        
        document.getElementById('adminHint').style.display = isAdmin() ? 'block' : 'none';
        
        // Fetch attendance records
        if (!allMembers.length) {
            await refreshMembers();
        }
        const aRes = await fetch('/api/attendance', {headers: {Authorization: `Bearer ${token}`}});
        const records = await aRes.json();
        const filteredMembers = getFilteredMembers();
        
        // Calculate all days in the selected month
        const days = [];
        const start = new Date(year, month, 1);
        const end = new Date(year, month + 1, 0);
        
        for(let d = new Date(start); d <= end; d.setDate(d.getDate() + 1)) {
            if (d.getDay() === 0) {
                days.push(new Date(d));
            }
        }
        
        // Build attendance map keyed by date string
        const attendanceMap = {};
        records.forEach(r => {
            const dt = r.check_in || r.date || r.created_at;
            if(!dt) return;
            const datePart = dt.split('T')[0];
            if(!attendanceMap[datePart]) attendanceMap[datePart] = new Set();
            attendanceMap[datePart].add(String(r.member_id || r.memberId));
        });
        
        // Build table header with all days
        const thead = document.getElementById('attendanceHead');
        thead.innerHTML = '';
        const headerRow = document.createElement('tr');
        headerRow.innerHTML = '<th>Member</th>' + 
            days.map(d => `<th>${d.getDate()}/${d.getMonth()+1}</th>`).join('');
        thead.appendChild(headerRow);
        
        // Build table body
        const tbody = document.getElementById('attendanceTable');
        tbody.innerHTML = '';
        
        filteredMembers.forEach(m => {
            const tr = document.createElement('tr');
            let rowHtml = `<td><strong>${m.name}</strong></td>`;
            
            days.forEach(d => {
                const yyyy = d.getFullYear();
                const mm = String(d.getMonth() + 1).padStart(2, '0');
                const dd = String(d.getDate()).padStart(2, '0');
                const key = `${yyyy}-${mm}-${dd}`;
                const present = Boolean(attendanceMap[key] && attendanceMap[key].has(String(m.id)));
                
                if (isAdmin()) {
                    rowHtml += `<td class="clickable-cell"
                        data-member-id="${m.id}"
                        data-date="${key}"
                        data-present="${present ? 'true' : 'false'}"
                        data-pending="false"
                        title="Click to toggle attendance">
                        ${getAttendanceCellContent(present)}
                    </td>`;
                } else {
                    rowHtml += `<td>${getAttendanceCellContent(present)}</td>`;
                }
            });
            
            tr.innerHTML = rowHtml;
            tbody.appendChild(tr);
        });
        
    } catch(err) {
        console.error('Error loading attendance:', err);
        alert('Error loading attendance');
    }
}

// Edit attendance (toggle presence/absence)
async function editAttendance(cell, memberId, dateStr) {
    if(!isAdmin()) {
        alert('Only admins can edit attendance');
        return;
    }

    if (!cell || cell.dataset.pending === 'true') {
        return;
    }

    const currentStatus = cell.dataset.present === 'true';
    const nextStatus = !currentStatus;
    paintAttendanceCell(cell, nextStatus, true);
    
    try {
        // If currently present, delete the record; if absent, add it
        if(currentStatus) {
            // Delete the attendance record
            const res = await fetch('/api/attendance', {
                method: 'DELETE',
                headers: {
                    "Content-Type": "application/json",
                    "Authorization": `Bearer ${token}`
                },
                body: JSON.stringify({ memberId, date: dateStr })
            });
            
            if(!res.ok) {
                const json = await res.json();
                paintAttendanceCell(cell, currentStatus, false);
                alert(json.error || 'Error deleting attendance');
                return;
            }
        } else {
            // Add attendance record for this date
            const res = await fetch('/api/attendance', {
                method: 'POST',
                headers: {
                    "Content-Type": "application/json",
                    "Authorization": `Bearer ${token}`
                },
                body: JSON.stringify({ memberId, date: dateStr + ' 09:00:00' })
            });
            
            if(!res.ok) {
                const json = await res.json();
                paintAttendanceCell(cell, currentStatus, false);
                alert(json.error || 'Error marking attendance');
                return;
            }
        }

        paintAttendanceCell(cell, nextStatus, false);
    } catch(err) {
        paintAttendanceCell(cell, currentStatus, false);
        console.error('Error toggling attendance:', err);
        alert('Error updating attendance');
    }
}

// Initialize page
populateMonthYear();
document.getElementById('monthSelect').addEventListener('change', loadAttendance);
document.getElementById('yearSelect').addEventListener('change', loadAttendance);
const departmentSelect = document.getElementById('departmentSelect');
if (departmentSelect) {
    departmentSelect.addEventListener('change', (e) => {
        activeDepartment = e.target.value || MASTER_LABEL;
        populateMemberDropdown();
        loadAttendance();
    });
}

const attendanceTableBody = document.getElementById('attendanceTable');
if (attendanceTableBody) {
    attendanceTableBody.addEventListener('click', (event) => {
        const cell = event.target.closest('td.clickable-cell');
        if (!cell || !attendanceTableBody.contains(cell) || !isAdmin()) {
            return;
        }

        const memberId = Number(cell.dataset.memberId);
        const dateStr = cell.dataset.date;
        if (!memberId || !dateStr) {
            return;
        }

        editAttendance(cell, memberId, dateStr);
    });
}

// Create member modal
const memberModal = document.getElementById('memberModal');
const createMemberBtn = document.getElementById('createMemberBtn');
const closeModalBtn = document.getElementById('closeModalBtn');
const createMemberForm = document.getElementById('createMemberForm');

if (createMemberBtn) {
    createMemberBtn.addEventListener('click', () => {
        memberModal.style.display = 'block';
        const deptInput = document.getElementById('newMemberDepartment');
        if (deptInput) {
            deptInput.value = (activeDepartment !== MASTER_LABEL && activeDepartment !== UNASSIGNED_LABEL)
                ? activeDepartment
                : '';
        }
    });
}

if (closeModalBtn) {
    closeModalBtn.addEventListener('click', () => {
        memberModal.style.display = 'none';
        createMemberForm.reset();
    });
}

if (createMemberForm) {
    createMemberForm.addEventListener('submit', async (e) => {
        e.preventDefault();
        
        try {
            const res = await fetch('/api/members', {
                method: 'POST',
                headers: {
                    "Content-Type": "application/json",
                    "Authorization": `Bearer ${token}`
                },
                body: JSON.stringify({
                    name: document.getElementById('newMemberName').value,
                    email: document.getElementById('newMemberEmail').value || null,
                    gender: document.getElementById('newMemberGender').value || null,
                    department: document.getElementById('newMemberDepartment').value || null,
                    phone: document.getElementById('newMemberPhone').value || null,
                    address: document.getElementById('newMemberAddress').value || null
                })
            });
            
            const json = await res.json();
            if (res.ok) {
                alert('Member created successfully');
                memberModal.style.display = 'none';
                createMemberForm.reset();
                refreshMembers(); // Refresh the dropdown
            } else {
                alert(json.error || 'Error creating member');
            }
        } catch(err) {
            console.error('Error:', err);
            alert('Error creating member');
        }
    });
}

// Close modal when clicking outside
memberModal.addEventListener('click', (e) => {
    if (e.target === memberModal) {
        memberModal.style.display = 'none';
    }
});

refreshMembers().then(loadAttendance);

</script>
</body>
</html>
