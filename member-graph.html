<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Member Attendance Graph</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<link rel="stylesheet" href="css/styles.css">
<link rel="stylesheet" href="css/church-theme.css">
<style>
.member-report {
    display: grid;
    gap: 22px;
}

.controls {
    display: flex;
    gap: 12px;
    flex-wrap: wrap;
    align-items: end;
}

.filter-group {
    min-width: 180px;
}

.charts-container {
    display: grid;
    grid-template-columns: repeat(2, minmax(0, 1fr));
    gap: 22px;
}

@media (max-width: 900px) {
    .charts-container {
        grid-template-columns: 1fr;
    }
}
</style>
<link rel="manifest" href="manifest.webmanifest">
<meta name="theme-color" content="#0f6ecf">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Church App">
<link rel="apple-touch-icon" href="assets/icon-192.png"></head>
<body class="church-theme">
<div class="page">
    <div class="page-header">
        <div>
            <span class="page-kicker">Personal Report</span>
            <h1 id="memberName">Loading...</h1>
            <p class="page-intro">Open a clearer month-by-month attendance story for this member.</p>
        </div>
        <div class="header-actions">
            <button id="backBtn" type="button" class="btn btn-outline">&larr; Back to Members</button>
        </div>
    </div>

    <div class="member-report">
        <section class="card">
            <div class="controls">
                <div class="filter-group">
                    <label for="periodSelect">Period</label>
                    <select id="periodSelect">
                        <option value="01">January</option>
                        <option value="02">February</option>
                        <option value="03">March</option>
                        <option value="04">April</option>
                        <option value="05">May</option>
                        <option value="06">June</option>
                        <option value="07">July</option>
                        <option value="08">August</option>
                        <option value="09">September</option>
                        <option value="10">October</option>
                        <option value="11">November</option>
                        <option value="12">December</option>
                        <option value="year">Whole Year Average</option>
                    </select>
                </div>
                <button class="btn btn-primary" onclick="loadMemberAttendanceGraph()">Refresh</button>
                <button class="btn btn-warning" onclick="downloadMemberReport()">Download Report</button>
            </div>
        </section>

        <div class="charts-container">
            <div class="chart-box">
                <h3>Monthly Attendance %</h3>
                <div class="chart-wrap"><canvas id="memberAttendanceChart"></canvas></div>
            </div>
            <div class="chart-box">
                <h3>Attendance Trend</h3>
                <div class="chart-wrap"><canvas id="memberTrendChart"></canvas></div>
            </div>
        </div>

        <section class="card">
            <h3>Monthly Summary</h3>
            <div class="table-wrapper">
                <table id="summaryTable" class="summary-table">
                    <thead>
                        <tr>
                            <th>Month</th>
                            <th>Sundays</th>
                            <th>Present</th>
                            <th>Absent</th>
                            <th>Attendance %</th>
                        </tr>
                    </thead>
                    <tbody id="summaryTableBody"></tbody>
                </table>
            </div>
        </section>
    </div>
</div>

<script src="js/member-graph.js"></script>
<script src="js/pwa.js"></script>
</body>
</html>
